services:
  observability:
    # All-in-one Grafana OTEL-LGTM image (Grafana + Prometheus + Tempo + Loki +
    # OTel Collector). Per Guide14 the OTLP HTTP receiver is on 4318 and the
    # UI on 3000. The CP4 dashboard is provisioned from docs/grafana so it
    # loads without a manual import at demo time.
    image: grafana/otel-lgtm:0.11.0
    ports:
      - "3000:3000"
      - "4317:4317"
      - "4318:4318"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
    volumes:
      - ./docs/grafana/dashboards:/otel-lgtm/grafana/conf/provisioning/dashboards-cp4:ro
      - ./docs/grafana/provisioning/dashboards:/otel-lgtm/grafana/conf/provisioning/dashboards:ro

  frontend:
    build:
      context: ./
      dockerfile: ./frontend/Dockerfile
    ports:
      - "8080:80"
    volumes:
      - ./frontend/src:/usr/share/nginx/html

  orchestrator:
    build:
      context: ./
      dockerfile: ./orchestrator/Dockerfile
    ports:
      - "8081:5000"
    environment:
      - PYTHONUNBUFFERED=TRUE
      - PYTHONFILE=/app/orchestrator/src/app.py
      - PYTHONPATH=/app
    volumes:
      - ./utils:/app/utils
      - ./orchestrator/src:/app/orchestrator/src
    depends_on:
      - fraud_detection
      - transaction_verification
      - suggestions
      - order_queue

  fraud_detection:
    build:
      context: ./
      dockerfile: ./fraud_detection/Dockerfile
    ports:
      - "51251:50051"
    environment:
      - PYTHONUNBUFFERED=TRUE
      - PYTHONFILE=/app/fraud_detection/src/app.py
      - PYTHONPATH=/app
    volumes:
      - ./utils:/app/utils
      - ./fraud_detection/src:/app/fraud_detection/src

  transaction_verification:
    build:
      context: ./
      dockerfile: ./transaction_verification/Dockerfile
    ports:
      - "51252:50052"
    environment:
      - PYTHONUNBUFFERED=TRUE
      - PYTHONFILE=/app/transaction_verification/src/app.py
      - PYTHONPATH=/app
    volumes:
      - ./utils:/app/utils
      - ./transaction_verification/src:/app/transaction_verification/src

  suggestions:
    build:
      context: ./
      dockerfile: ./suggestions/Dockerfile
    ports:
      - "51253:50053"
    environment:
      - PYTHONUNBUFFERED=TRUE
      - PYTHONFILE=/app/suggestions/src/app.py
      - PYTHONPATH=/app
    volumes:
      - ./utils:/app/utils
      - ./suggestions/src:/app/suggestions/src

  order_queue:
    build:
      context: ./
      dockerfile: ./order_queue/Dockerfile
    ports:
      - "51254:50054"
    environment:
      - PYTHONUNBUFFERED=TRUE
      - PYTHONFILE=/app/order_queue/src/app.py
    volumes:
      - ./utils:/app/utils
      - ./order_queue/src:/app/order_queue/src

  order_executor_1:
    build:
      context: ./
      dockerfile: ./order_executor/Dockerfile
    ports:
      - "51255:50055"
    environment:
      - PYTHONUNBUFFERED=TRUE
      - PYTHONFILE=/app/order_executor/src/app.py
      - EXECUTOR_ID=1
      - EXECUTOR_PORT=50055
      - PEERS=1@order_executor_1:50055,2@order_executor_2:50055,3@order_executor_3:50055
      - PYTHONPATH=/app
    volumes:
      - ./utils:/app/utils
      - ./order_executor/src:/app/order_executor/src
    depends_on:
      - order_queue
      - payment_service
      - books_database_1
      - books_database_2
      - books_database_3

  order_executor_2:
    build:
      context: ./
      dockerfile: ./order_executor/Dockerfile
    ports:
      - "51256:50055"
    environment:
      - PYTHONUNBUFFERED=TRUE
      - PYTHONFILE=/app/order_executor/src/app.py
      - EXECUTOR_ID=2
      - EXECUTOR_PORT=50055
      - PEERS=1@order_executor_1:50055,2@order_executor_2:50055,3@order_executor_3:50055
      - PYTHONPATH=/app
    volumes:
      - ./utils:/app/utils
      - ./order_executor/src:/app/order_executor/src
    depends_on:
      - order_queue
      - payment_service
      - books_database_1
      - books_database_2
      - books_database_3

  order_executor_3:
    build:
      context: ./
      dockerfile: ./order_executor/Dockerfile
    ports:
      - "51257:50055"
    environment:
      - PYTHONUNBUFFERED=TRUE
      - PYTHONFILE=/app/order_executor/src/app.py
      - EXECUTOR_ID=3
      - EXECUTOR_PORT=50055
      - PEERS=1@order_executor_1:50055,2@order_executor_2:50055,3@order_executor_3:50055
      - PYTHONPATH=/app
    volumes:
      - ./utils:/app/utils
      - ./order_executor/src:/app/order_executor/src
    depends_on:
      - order_queue
      - payment_service
      - books_database_1
      - books_database_2
      - books_database_3

  payment_service:
    build:
      context: ./
      dockerfile: ./payment_service/Dockerfile
    ports:
      - "51261:50061"
    environment:
      - PYTHONUNBUFFERED=TRUE
      - PYTHONFILE=/app/payment_service/src/app.py
      - PYTHONPATH=/app
      - PAYMENT_PORT=50061
    volumes:
      - ./utils:/app/utils
      - ./payment_service/src:/app/payment_service/src

  books_database_1:
    build:
      context: ./
      dockerfile: ./books_database/Dockerfile
    ports:
      - "51258:50058"
    environment:
      - PYTHONUNBUFFERED=TRUE
      - PYTHONFILE=/app/books_database/src/app.py
      - PYTHONPATH=/app
      - REPLICA_ID=1
      - REPLICA_PORT=50058
      - PEERS=1@books_database_1:50058,2@books_database_2:50058,3@books_database_3:50058
      - STATE_DIR=/app/state
    volumes:
      - ./utils:/app/utils
      - ./books_database/src:/app/books_database/src
      - ./books_database/state/1:/app/state

  books_database_2:
    build:
      context: ./
      dockerfile: ./books_database/Dockerfile
    ports:
      - "51259:50058"
    environment:
      - PYTHONUNBUFFERED=TRUE
      - PYTHONFILE=/app/books_database/src/app.py
      - PYTHONPATH=/app
      - REPLICA_ID=2
      - REPLICA_PORT=50058
      - PEERS=1@books_database_1:50058,2@books_database_2:50058,3@books_database_3:50058
      - STATE_DIR=/app/state
    volumes:
      - ./utils:/app/utils
      - ./books_database/src:/app/books_database/src
      - ./books_database/state/2:/app/state

  books_database_3:
    build:
      context: ./
      dockerfile: ./books_database/Dockerfile
    ports:
      - "51260:50058"
    environment:
      - PYTHONUNBUFFERED=TRUE
      - PYTHONFILE=/app/books_database/src/app.py
      - PYTHONPATH=/app
      - REPLICA_ID=3
      - REPLICA_PORT=50058
      - PEERS=1@books_database_1:50058,2@books_database_2:50058,3@books_database_3:50058
      - STATE_DIR=/app/state
    volumes:
      - ./utils:/app/utils
      - ./books_database/src:/app/books_database/src
      - ./books_database/state/3:/app/state