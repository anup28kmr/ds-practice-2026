<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1200" role="img" aria-labelledby="title desc">
  <title id="title">Distributed commitment protocol (2PC) diagram</title>
  <desc id="desc">Sequence-style diagram showing the two-phase commit coordinator (leader order_executor) running Prepare then Commit across the books_database primary and the payment_service. One success path (both vote commit, decision=COMMIT) and one failure path (payment votes abort, decision=ABORT) are shown.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,3 L0,6 z" fill="#334155" />
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,3 L0,6 z" fill="#1d4ed8" />
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,3 L0,6 z" fill="#15803d" />
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,3 L0,6 z" fill="#b91c1c" />
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 700 30px 'Segoe UI', Arial, sans-serif; fill: #1f2937; }
      .subtitle { font: 16px 'Segoe UI', Arial, sans-serif; fill: #475569; }
      .lane-coord { fill: #ede9fe; stroke: #8b5cf6; stroke-width: 2; rx: 14; }
      .lane-db { fill: #fef3c7; stroke: #d97706; stroke-width: 2; rx: 14; }
      .lane-pay { fill: #fce7f3; stroke: #db2777; stroke-width: 2; rx: 14; }
      .lane-title { font: 700 18px 'Segoe UI', Arial, sans-serif; fill: #0f172a; text-anchor: middle; }
      .lane-sub { font: 13px 'Segoe UI', Arial, sans-serif; fill: #334155; text-anchor: middle; }
      .lane-line { stroke: #cbd5e1; stroke-width: 4; }
      .phase { font: 700 20px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .phase-line { stroke: #94a3b8; stroke-width: 2.5; stroke-dasharray: 8 8; }
      .case-line { stroke: #ef4444; stroke-width: 3; }
      .event { fill: #ffffff; stroke: #475569; stroke-width: 2; rx: 12; }
      .event-ok { fill: #ecfccb; stroke: #65a30d; stroke-width: 2; rx: 12; }
      .event-fail { fill: #fef2f2; stroke: #ef4444; stroke-width: 2; rx: 12; }
      .event-decide { fill: #fef3c7; stroke: #d97706; stroke-width: 2; rx: 12; }
      .event-note { fill: #fffbeb; stroke: #f59e0b; stroke-width: 2; rx: 12; }
      .box-title { font: 700 15px 'Segoe UI', Arial, sans-serif; fill: #111827; text-anchor: middle; }
      .box-sub { font: 13px 'Segoe UI', Arial, sans-serif; fill: #334155; text-anchor: middle; }
      .arrow { stroke: #334155; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .arrow-prepare { stroke: #1d4ed8; stroke-width: 3; fill: none; marker-end: url(#arrow-blue); }
      .arrow-commit { stroke: #15803d; stroke-width: 3; fill: none; marker-end: url(#arrow-green); }
      .arrow-abort { stroke: #b91c1c; stroke-width: 3; fill: none; marker-end: url(#arrow-red); }
      .arrow-vote { stroke: #334155; stroke-width: 2.5; fill: none; marker-end: url(#arrow); stroke-dasharray: 8 5; }
      .small { font: 13px 'Segoe UI', Arial, sans-serif; fill: #1e293b; }
      .small-blue { font: 700 13px 'Segoe UI', Arial, sans-serif; fill: #1d4ed8; }
      .small-green { font: 700 13px 'Segoe UI', Arial, sans-serif; fill: #15803d; }
      .small-red { font: 700 13px 'Segoe UI', Arial, sans-serif; fill: #b91c1c; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1200" height="1200" />

  <text class="title" x="60" y="48">Distributed commitment protocol: two-phase commit (2PC)</text>
  <text class="subtitle" x="60" y="78">The leader order_executor is the coordinator. The books_database primary and the payment_service are participants. The decision is logged before phase 2 so every round leaves an audit record.</text>

  <rect class="lane-coord" x="80" y="110" width="260" height="58" />
  <rect class="lane-db" x="470" y="110" width="260" height="58" />
  <rect class="lane-pay" x="860" y="110" width="260" height="58" />

  <text class="lane-title" x="210" y="138">Executor (coordinator)</text>
  <text class="lane-sub" x="210" y="158">leader order_executor</text>
  <text class="lane-title" x="600" y="138">books_database primary</text>
  <text class="lane-sub" x="600" y="158">participant 1</text>
  <text class="lane-title" x="990" y="138">payment_service</text>
  <text class="lane-sub" x="990" y="158">participant 2</text>

  <line class="lane-line" x1="210" y1="170" x2="210" y2="1170" />
  <line class="lane-line" x1="600" y1="170" x2="600" y2="1170" />
  <line class="lane-line" x1="990" y1="170" x2="990" y2="1170" />

  <text class="phase" x="60" y="210">Case A: happy path (both vote commit) — decision=COMMIT</text>

  <rect class="event" x="100" y="230" width="220" height="54" />
  <text class="box-title" x="210" y="254">2pc_start</text>
  <text class="box-sub" x="210" y="273">dequeue order, fan out Phase 1</text>

  <text class="phase" x="60" y="315">Phase 1: Prepare / Vote</text>

  <path class="arrow-prepare" d="M210 345 L600 345" />
  <text class="small-blue" x="310" y="335">Prepare(order, items)</text>

  <path class="arrow-prepare" d="M210 375 L990 375" />
  <text class="small-blue" x="430" y="365">Prepare(order, amount)</text>

  <rect class="event" x="490" y="395" width="220" height="62" />
  <text class="box-title" x="600" y="419">stage + persist</text>
  <text class="box-sub" x="600" y="438">pending_orders[order]=items</text>
  <text class="box-sub" x="600" y="454">txn_&lt;order&gt;.json on disk</text>

  <rect class="event" x="880" y="395" width="220" height="62" />
  <text class="box-title" x="990" y="419">stage amount</text>
  <text class="box-sub" x="990" y="438">prepared[order]=amount</text>
  <text class="box-sub" x="990" y="454">in-memory only</text>

  <path class="arrow-vote" d="M600 485 L210 485" />
  <text class="small" x="320" y="475">vote_commit=true</text>

  <path class="arrow-vote" d="M990 515 L210 515" />
  <text class="small" x="450" y="505">vote_commit=true</text>

  <rect class="event-decide" x="90" y="540" width="240" height="66" />
  <text class="box-title" x="210" y="566">2pc_decision=COMMIT</text>
  <text class="box-sub" x="210" y="585">participants=[db,payment]</text>
  <text class="box-sub" x="210" y="601">decision record (stdout log)</text>

  <text class="phase" x="60" y="640">Phase 2: Commit</text>

  <path class="arrow-commit" d="M210 670 L600 670" />
  <text class="small-green" x="320" y="660">Commit(order)</text>

  <rect class="event-ok" x="490" y="685" width="220" height="64" />
  <text class="box-title" x="600" y="710">apply + replicate</text>
  <text class="box-sub" x="600" y="729">commit_applied, seq bumped</text>
  <text class="box-sub" x="600" y="747">remove txn file</text>

  <path class="arrow-vote" d="M600 775 L210 775" />
  <text class="small" x="320" y="765">success</text>

  <path class="arrow-commit" d="M210 800 L990 800" />
  <text class="small-green" x="460" y="790">Commit(order)</text>

  <rect class="event-ok" x="880" y="815" width="220" height="54" />
  <text class="box-title" x="990" y="839">commit_applied</text>
  <text class="box-sub" x="990" y="858">committed.add(order)</text>

  <path class="arrow-vote" d="M990 890 L210 890" />
  <text class="small" x="460" y="880">success</text>

  <rect class="event-ok" x="100" y="910" width="220" height="50" />
  <text class="box-title" x="210" y="934">2pc_commit_applied</text>
  <text class="box-sub" x="210" y="950">order_done status=committed</text>

  <line class="case-line" x1="60" y1="985" x2="1140" y2="985" />
  <text class="phase" x="60" y="1020">Case B: abort path (DB votes abort, e.g. insufficient stock) — decision=ABORT</text>

  <path class="arrow-prepare" d="M210 1050 L600 1050" />
  <text class="small-blue" x="310" y="1040">Prepare(order, items)</text>

  <path class="arrow-prepare" d="M210 1080 L990 1080" />
  <text class="small-blue" x="470" y="1070">Prepare(order, amount)</text>

  <path class="arrow-vote" d="M600 1110 L210 1110" />
  <text class="small-red" x="300" y="1100">vote_abort (insufficient stock)</text>

  <path class="arrow-vote" d="M990 1140 L210 1140" />
  <text class="small-green" x="470" y="1130">vote_commit=true</text>

  <rect class="event-fail" x="90" y="1160" width="240" height="36" />
  <text class="box-title" x="210" y="1184">2pc_decision=ABORT → Abort sent to both</text>

  <rect class="event-note" x="780" y="220" width="360" height="110" />
  <text class="box-title" x="960" y="245">Decision record</text>
  <text class="box-sub" x="960" y="267">Logged to stdout BEFORE phase 2,</text>
  <text class="box-sub" x="960" y="285">so every round leaves an audit</text>
  <text class="box-sub" x="960" y="303">point naming the participants</text>
  <text class="box-sub" x="960" y="321">and the outcome.</text>

  <rect class="event-note" x="780" y="1020" width="360" height="150" />
  <text class="box-title" x="960" y="1045">Participant recovery (Phase 6)</text>
  <text class="box-sub" x="960" y="1067">books_database writes txn_&lt;order&gt;.json</text>
  <text class="box-sub" x="960" y="1085">before voting commit, so a crashed</text>
  <text class="box-sub" x="960" y="1103">replica can reload pending_orders</text>
  <text class="box-sub" x="960" y="1121">on restart. Commit/Abort are</text>
  <text class="box-sub" x="960" y="1139">idempotent on both participants,</text>
  <text class="box-sub" x="960" y="1157">so the coordinator retries safely.</text>
</svg>
