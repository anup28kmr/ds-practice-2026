<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 980" role="img" aria-labelledby="title desc">
  <title id="title">Consistency protocol diagram for the replicated books database</title>
  <desc id="desc">Sequence-style diagram showing primary-backup replication across three books_database replicas. The executor always sends Writes and Reads to the elected primary (DB-3); the primary fans each Write out to both backups and only acks the client once every backup has applied the new value.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,3 L0,6 z" fill="#334155" />
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,3 L0,6 z" fill="#1d4ed8" />
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,3 L0,6 z" fill="#15803d" />
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 700 30px 'Segoe UI', Arial, sans-serif; fill: #1f2937; }
      .subtitle { font: 16px 'Segoe UI', Arial, sans-serif; fill: #475569; }
      .lane-exec { fill: #ede9fe; stroke: #8b5cf6; stroke-width: 2; rx: 14; }
      .lane-primary { fill: #fef3c7; stroke: #d97706; stroke-width: 2; rx: 14; }
      .lane-backup { fill: #e0f2fe; stroke: #38bdf8; stroke-width: 2; rx: 14; }
      .lane-title { font: 700 18px 'Segoe UI', Arial, sans-serif; fill: #0f172a; text-anchor: middle; }
      .lane-sub { font: 13px 'Segoe UI', Arial, sans-serif; fill: #334155; text-anchor: middle; }
      .lane-line { stroke: #cbd5e1; stroke-width: 4; }
      .phase { font: 700 20px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .phase-line { stroke: #94a3b8; stroke-width: 2.5; stroke-dasharray: 8 8; }
      .event { fill: #ffffff; stroke: #475569; stroke-width: 2; rx: 12; }
      .event-ok { fill: #ecfccb; stroke: #65a30d; stroke-width: 2; rx: 12; }
      .event-note { fill: #fffbeb; stroke: #f59e0b; stroke-width: 2; rx: 12; }
      .box-title { font: 700 15px 'Segoe UI', Arial, sans-serif; fill: #111827; text-anchor: middle; }
      .box-sub { font: 13px 'Segoe UI', Arial, sans-serif; fill: #334155; text-anchor: middle; }
      .arrow { stroke: #334155; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .arrow-write { stroke: #1d4ed8; stroke-width: 3; fill: none; marker-end: url(#arrow-blue); }
      .arrow-replicate { stroke: #15803d; stroke-width: 3; fill: none; marker-end: url(#arrow-green); }
      .arrow-ack { stroke: #334155; stroke-width: 2.5; fill: none; marker-end: url(#arrow); stroke-dasharray: 8 5; }
      .small { font: 13px 'Segoe UI', Arial, sans-serif; fill: #1e293b; }
      .small-blue { font: 700 13px 'Segoe UI', Arial, sans-serif; fill: #1d4ed8; }
      .small-green { font: 700 13px 'Segoe UI', Arial, sans-serif; fill: #15803d; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1200" height="980" />

  <text class="title" x="60" y="48">Replicated database: primary-backup consistency</text>
  <text class="subtitle" x="60" y="78">Three books_database replicas elect a primary via bully. All Writes go to the primary, which replicates synchronously to every backup before acking. Reads go to the primary only (strong consistency).</text>

  <rect class="lane-exec" x="60" y="110" width="200" height="58" />
  <rect class="lane-primary" x="340" y="110" width="240" height="58" />
  <rect class="lane-backup" x="660" y="110" width="220" height="58" />
  <rect class="lane-backup" x="940" y="110" width="220" height="58" />

  <text class="lane-title" x="160" y="138">Executor (leader)</text>
  <text class="lane-sub" x="160" y="158">client of the DB tier</text>
  <text class="lane-title" x="460" y="138">books_database_3</text>
  <text class="lane-sub" x="460" y="158">primary (highest id wins bully)</text>
  <text class="lane-title" x="770" y="138">books_database_1</text>
  <text class="lane-sub" x="770" y="158">backup</text>
  <text class="lane-title" x="1050" y="138">books_database_2</text>
  <text class="lane-sub" x="1050" y="158">backup</text>

  <line class="lane-line" x1="160" y1="170" x2="160" y2="930" />
  <line class="lane-line" x1="460" y1="170" x2="460" y2="930" />
  <line class="lane-line" x1="770" y1="170" x2="770" y2="930" />
  <line class="lane-line" x1="1050" y1="170" x2="1050" y2="930" />

  <text class="phase" x="60" y="210">Phase 1: primary announces itself after election</text>

  <rect class="event-ok" x="370" y="225" width="180" height="60" />
  <text class="box-title" x="460" y="250">became primary</text>
  <text class="box-sub" x="460" y="270">logs: primary=3</text>

  <path class="arrow" d="M460 295 L770 295" />
  <text class="small-green" x="560" y="285">Coordinator(3)</text>
  <path class="arrow" d="M460 325 L1050 325" />
  <text class="small-green" x="690" y="315">Coordinator(3)</text>

  <line class="phase-line" x1="60" y1="360" x2="1140" y2="360" />
  <text class="phase" x="60" y="395">Phase 2: Write from executor — primary replicates to all backups before acking</text>

  <path class="arrow-write" d="M160 430 L460 430" />
  <text class="small-blue" x="235" y="420">Write(Book A, 10)</text>

  <rect class="event" x="370" y="450" width="180" height="58" />
  <text class="box-title" x="460" y="474">stage new value</text>
  <text class="box-sub" x="460" y="494">seq=42, old=? new=10</text>

  <path class="arrow-replicate" d="M460 530 L770 530" />
  <text class="small-green" x="560" y="520">ReplicateWrite(Book A, 10, seq=42)</text>

  <path class="arrow-replicate" d="M460 560 L1050 560" />
  <text class="small-green" x="700" y="550">ReplicateWrite(Book A, 10, seq=42)</text>

  <rect class="event" x="680" y="580" width="180" height="56" />
  <text class="box-title" x="770" y="603">apply locally</text>
  <text class="box-sub" x="770" y="622">replicate_applied seq=42</text>

  <rect class="event" x="960" y="580" width="180" height="56" />
  <text class="box-title" x="1050" y="603">apply locally</text>
  <text class="box-sub" x="1050" y="622">replicate_applied seq=42</text>

  <path class="arrow-ack" d="M770 655 L460 655" />
  <text class="small" x="560" y="645">ack(success=true)</text>
  <path class="arrow-ack" d="M1050 685 L460 685" />
  <text class="small" x="680" y="675">ack(success=true)</text>

  <rect class="event-ok" x="370" y="705" width="180" height="58" />
  <text class="box-title" x="460" y="729">commit locally</text>
  <text class="box-sub" x="460" y="748">write_committed backups_acked=[1,2]</text>

  <path class="arrow-ack" d="M460 785 L160 785" />
  <text class="small" x="250" y="775">ok</text>

  <line class="phase-line" x1="60" y1="810" x2="1140" y2="810" />
  <text class="phase" x="60" y="845">Phase 3: Read from executor — answered by the primary only</text>

  <path class="arrow-write" d="M160 885 L460 885" />
  <text class="small-blue" x="245" y="875">Read(Book A)</text>

  <path class="arrow-ack" d="M460 915 L160 915" />
  <text class="small" x="250" y="905">read_ok value=10</text>

  <rect class="event-note" x="910" y="395" width="250" height="108" />
  <text class="box-title" x="1035" y="420">Why synchronous replication?</text>
  <text class="box-sub" x="1035" y="442">Primary blocks until every live</text>
  <text class="box-sub" x="1035" y="460">backup ACKs. A later Read can</text>
  <text class="box-sub" x="1035" y="478">never observe a value that has</text>
  <text class="box-sub" x="1035" y="496">not already reached every replica.</text>

  <rect class="event-note" x="910" y="840" width="250" height="108" />
  <text class="box-title" x="1035" y="865">Failover</text>
  <text class="box-sub" x="1035" y="887">If the primary dies, bully elects</text>
  <text class="box-sub" x="1035" y="905">a new primary (highest live id).</text>
  <text class="box-sub" x="1035" y="923">Reads/Writes are retried against</text>
  <text class="box-sub" x="1035" y="941">the new primary.</text>
</svg>
