syntax = "proto3";

package fraud_detection;

service FraudDetectionService {
  rpc InitOrder (InitOrderRequest) returns (EventResponse);

  rpc CheckUserFraud (EventRequest) returns (EventResponse);
  rpc CheckCardFraud (EventRequest) returns (EventResponse);

  // Receive a forwarded vector clock from another microservice.
  rpc ForwardVC (VCForward) returns (EventResponse);

  rpc ClearOrder (ClearOrderRequest) returns (EventResponse);
}

message VectorClock {
  repeated int32 values = 1;
}

message OrderItem {
  string title = 1;
  int32 quantity = 2;
}

message OrderData {
  string order_id = 1;
  string user_name = 2;
  string user_contact = 3;
  string card_number = 4;
  string expiration_date = 5;
  string cvv = 6;
  int32 item_count = 7;
  bool terms_accepted = 8;
  repeated OrderItem items = 9;
}

message InitOrderRequest {
  OrderData order = 1;
}

message EventRequest {
  string order_id = 1;
  VectorClock vc = 2;
}

message EventResponse {
  bool success = 1;
  string message = 2;
  VectorClock vc = 3;
}

message VCForward {
  string order_id = 1;
  string source_event = 2;
  VectorClock vc = 3;
  bool success = 4;
  string message = 5;
}

message ClearOrderRequest {
  string order_id = 1;
  VectorClock final_vc = 2;
}