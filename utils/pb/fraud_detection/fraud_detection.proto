syntax = "proto3";
package fraud_detection;

service FraudDetectionService {
    rpc InitOrder (InitOrderRequest) returns (InitOrderResponse);
    rpc CheckUserDataForFraud (FraudCheckRequest) returns (FraudCheckResponse);
    rpc CheckCreditCardForFraud (FraudCheckRequest) returns (FraudCheckResponse);
    rpc ClearOrder (ClearOrderRequest) returns (ClearOrderResponse);
}

message InitOrderRequest {
    string order_id = 1;
    string user_name = 2;
    string user_contact = 3;
    string card_number = 4;
    repeated int32 vector_clock = 5;
}

message InitOrderResponse {
    bool success = 1;
    repeated int32 vector_clock = 2;
}

message FraudCheckRequest {
    string order_id = 1;
    repeated int32 vector_clock = 2;
}

message FraudCheckResponse {
    bool is_fraud = 1;
    string reason = 2;
    repeated int32 vector_clock = 3;
}

message ClearOrderRequest {
    string order_id = 1;
    repeated int32 vector_clock = 2;
}

message ClearOrderResponse {
    bool success = 1;
}
